# CI — quality gates ของ Web UI ทั้งสองฝั่ง
# ฝั่ง Python pipeline (agents/core/tools) มี test หนักที่บางส่วนต้องใช้ API key จริง
# จึงรันเฉพาะ tests/api (Web UI backend) ที่ isolate ด้วย fake run_fn แล้วเท่านั้น
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web UI (lint + typecheck + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      # build รวม tsc -b (typecheck ทั้ง src + tests) แล้วค่อย vite build
      - run: npm run build

  api:
    name: API backend (pytest tests/api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run pytest tests/api -q
